name: Agentic Spec Template Validation

on:
  push:
    paths:
      - "specs/**/*.md"
      - "specs/**/*.yml"
      - "specs/**/*.yaml"
      - ".ai/inbox/specs/**/*.md"
      - ".ai/inbox/specs/**/*.yml"
      - ".ai/inbox/specs/**/*.yaml"
  pull_request:
    paths:
      - "specs/**/*.md"
      - "specs/**/*.yml"
      - "specs/**/*.yaml"
      - ".ai/inbox/specs/**/*.md"
      - ".ai/inbox/specs/**/*.yml"
      - ".ai/inbox/specs/**/*.yaml"
  workflow_dispatch:

jobs:
  validate-agentic-specs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install optional YAML dependency
        run: python -m pip install pyyaml

      - name: Find changed specs
        id: specs
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch origin "${{ github.base_ref }}" --depth=1 || true
            files=$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD || true)
          else
            if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
              files=$(git diff --name-only HEAD~1..HEAD || true)
            else
              files=$(git ls-files || true)
            fi
          fi
          echo "$files" \
            | grep -E '^(specs/|\.ai/inbox/specs/).+\.(md|ya?ml)$' \
            | grep -Evi '(^|/)(README\.md|spec-package\.md|_template|template\.|.*\.template\.|example-|.*\.example\.)' \
            > /tmp/specs.txt || true
          echo "count=$(wc -l < /tmp/specs.txt | tr -d ' ')" >> "$GITHUB_OUTPUT"
          cat /tmp/specs.txt

      - name: Validate changed specs
        if: steps.specs.outputs.count != '0'
        run: |
          xargs -a /tmp/specs.txt python .ai/scripts/validate_agentic_spec.py --allow-status ready_for_agents --allow-status draft
