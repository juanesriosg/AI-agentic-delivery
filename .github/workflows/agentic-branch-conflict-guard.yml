name: Agentic branch conflict guard

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  branch_conflict_guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch all branches
        run: |
          git fetch origin '+refs/heads/*:refs/remotes/origin/*' --prune

      - name: Run branch conflict guard
        env:
          AGENTIC_DEFAULT_BASE_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          python .ai/scripts/branch_conflict_guard.py guard \
            --mode pr \
            --base "${{ github.event.repository.default_branch }}" \
            --current-diff-base "${{ github.base_ref }}" \
            --exclude-branch "${{ github.head_ref }}" \
            --exclude-branch "${{ github.base_ref }}" \
            --json-output branch-conflict-report.json \
            --markdown-output branch-conflict-report.md

      - name: Upload branch conflict report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: branch-conflict-report
          path: |
            branch-conflict-report.json
            branch-conflict-report.md
