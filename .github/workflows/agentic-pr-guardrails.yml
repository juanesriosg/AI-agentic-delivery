name: Agentic PR guardrails

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  guardrails:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: hashicorp/setup-terraform@v3

      - name: Detect task id from branch
        id: task
        shell: bash
        run: |
          BRANCH="${{ github.head_ref }}"
          TASK_ID="$(basename "$BRANCH")"
          SOURCE_SPEC_BRANCH_PR=false
          case "$BRANCH" in
            dev/*|spec/*|chatgpt/*|ai-spec/*|feature/spec/*) SOURCE_SPEC_BRANCH_PR=true ;;
          esac
          echo "task_id=$TASK_ID" >> "$GITHUB_OUTPUT"
          echo "source_spec_branch_pr=$SOURCE_SPEC_BRANCH_PR" >> "$GITHUB_OUTPUT"


      - name: Run branch conflict guard
        env:
          AGENTIC_DEFAULT_BASE_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          python .ai/scripts/branch_conflict_guard.py guard \
            --mode pr \
            --base "${{ github.event.repository.default_branch }}" \
            --current-diff-base "${{ github.base_ref }}" \
            --exclude-branch "${{ github.head_ref }}" \
            --exclude-branch "${{ github.base_ref }}" \
            --json-output branch-conflict-report.json \
            --markdown-output branch-conflict-report.md

      - name: Run PR guardrails
        env:
          AGENT_SOURCE_SPEC_BRANCH_PR: ${{ steps.task.outputs.source_spec_branch_pr }}
          AGENT_ALLOW_MULTI_DOMAIN_PR: ${{ steps.task.outputs.source_spec_branch_pr }}
          AGENT_ALLOW_EVIDENCE_ONLY: ${{ steps.task.outputs.source_spec_branch_pr }}
          AGENT_MAX_FILES_CHANGED: ${{ steps.task.outputs.source_spec_branch_pr == 'true' && '80' || '35' }}
          AGENT_MAX_LINES_CHANGED: ${{ steps.task.outputs.source_spec_branch_pr == 'true' && '6000' || '1200' }}
          AGENT_BLOCK_PLACEHOLDER_EVIDENCE: 'true'
        run: |
          python .ai/scripts/pr_guardrails.py \
            --base "${{ github.base_ref }}" \
            --task-id "${{ steps.task.outputs.task_id }}"

      - name: Run AWS/Terraform guardrails
        run: |
          python .ai/scripts/aws_terraform_guardrails.py \
            --base "${{ github.base_ref }}" \
            --task-id "${{ steps.task.outputs.task_id }}"
