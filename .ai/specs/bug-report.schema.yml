version: 3
name: Agent Bug Report Schema
required_fields:
  bug_id: string
  title: string
  severity: [critical, high, medium, low]
  confidence: [confirmed, suspected, flaky]
  related_task: string
  related_pr: string
  expected_behavior: string
  actual_behavior: string
  reproduction_steps: list
  environment: string
  evidence: list
  suspected_area: string
  blocks_current_task: boolean
  regression_test_status: [added, proposed, not_practical, not_applicable]
  recommended_next_action: string
optional_fields:
  logs: list
  screenshots: list
  affected_users: string
  workaround: string
  owner: string
